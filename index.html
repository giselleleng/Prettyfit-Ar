<!DOCTYPE html>
<html>

<head>

<title>PrettyFit AR Try On</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}


#camera{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
}


#shoe{
position:fixed;
width:350px;
bottom:80px;
left:50%;
transform:translateX(-50%);
z-index:10;
}


#text{
position:fixed;
top:20px;
width:100%;
text-align:center;
color:white;
font-size:22px;
font-weight:bold;
background:rgba(0,0,0,0.5);
padding:10px;
z-index:20;
}


</style>

</head>


<body>


<div id="text">
Move your feet into frame 👠
</div>


<video 
id="camera"
autoplay
playsinline>
</video>


<img id="shoe">


<script>


const params = new URLSearchParams(window.location.search);

let shoe = params.get("shoe");


let shoes = {


"cyllia":
"cyllia-sneakers.png",


"aubree":
"aubree-flats.png",


"lacey":
"lacey-sandals.png",


"talulla":
"talulla-sandals.png",


"jovina":
"jovina-heels.png",


"shermaine":
"shermaine-pumps.png",


"brevia":
"brevia-flats.png",


"mona":
"mona-loafers.png",


"pearlyn":
"pearlyn-mules.png"


};


document.getElementById("shoe").src =
shoes[shoe] || "aubree-flats.png";



navigator.mediaDevices.getUserMedia({

video:true

})

.then(stream=>{

document.getElementById("camera").srcObject=stream;

})


.catch(()=>{

alert("Please allow camera access");

});


</script>


</body>


</html>
