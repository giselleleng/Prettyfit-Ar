<!DOCTYPE html>
<html>

<head>
<title>PrettyFit AR Try On</title>

<style>

body{
margin:0;
overflow:hidden;
}

#camera{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
}

#shoe{
position:fixed;
width:350px;
bottom:80px;
left:50%;
transform:translateX(-50%);
z-index:10;
}

#text{
position:fixed;
top:30px;
width:100%;
text-align:center;
color:white;
font-size:24px;
font-family:Arial;
font-weight:bold;
z-index:20;
background:rgba(0,0,0,0.4);
padding:10px;
}

</style>

</head>


<body>


<div id="text">
Move your feet into frame 👠
</div>


<video 
id="camera"
autoplay
playsinline>
</video>


<img 
id="shoe"
src="shoe.png">


<script>

navigator.mediaDevices.getUserMedia({
video:true
})

.then(stream=>{
document.getElementById("camera").srcObject=stream;
})

.catch(error=>{
alert("Camera permission required");
});


</script>


</body>

</html>
