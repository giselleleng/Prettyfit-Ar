<!DOCTYPE html>
<html>

<head>

<title>PrettyFit AR Try-On</title>

<style>

body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}


/* Camera */
#camera {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
}


/* Header */
#title {
  position: fixed;
  top: 5%;
  width: 100%;

  text-align: center;
  color: white;

  font-size: 40px;
  font-weight: bold;

  background: rgba(0,0,0,0.5);
  padding: 25px 0;

  z-index: 20;
}


/* Shoe AR Image */
#shoe {

  position: fixed;

  width: 28.5vw;
  max-width: 220px;
  min-width: 145px;

  bottom: 3%;
  left: 50%;

  transform: translateX(-50%);

  z-index: 10;

}


/* Phone adjustment */
@media (max-width: 600px) {

  #shoe {

    width: 38vw;
    max-width: 240px;
    min-width: 150px;

    bottom: 3%;

  }


  #title {

    font-size: 32px;
    padding: 20px 0;

  }

}


</style>

</head>


<body>


<div id="title">
PrettyFit AR Try-On 👠
</div>


<video 
id="camera" 
autoplay 
playsinline>
</video>


<img 
id="shoe">


<script>


// Start camera

navigator.mediaDevices.getUserMedia({

video:{
 facingMode:"environment"
}

})

.then(stream => {

document.getElementById("camera").srcObject = stream;

})

.catch(error => {

alert("Camera permission needed");

});




// Prevent old image cache
const refresh = new Date().getTime();


// PrettyFit Shoes

const shoes = {


aubree:
"Aubree-Flats.png",


brevia:
"Brevia-Flats.png",


cyllia:
"Cyllia-Sneakers.png",


jovina:
"Jovina-Heels.png",


lacey:
"Lacey-Sandals.png",


mona:
"Mona-Loafers.png",


pearlyn:
"Pearlyn-Mules.png",


shermaine:
"Shermaine-Pumps.png",


talulla:
"Talulla-Sandals.png"


};



// Read shoe from link

const url =
new URLSearchParams(window.location.search);


const selected =
url.get("shoe");


// Show selected shoe

if(selected && shoes[selected]){


document.getElementById("shoe").src =
shoes[selected] + "?update=" + refresh;


}

else{


// default shoe
document.getElementById("shoe").src =
"Aubree-Flats.png?update=" + refresh;


}



</script>


</body>


</html>
